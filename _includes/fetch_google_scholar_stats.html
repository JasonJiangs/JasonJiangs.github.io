<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        var citationEles = document.getElementsByClassName('show_paper_citations')

        function hideCitationElements() {
            Array.prototype.forEach.call(citationEles, function (element) {
                element.style.display = 'none';
            });
        }

        $.getJSON(gsDataBaseUrl + "google-scholar-stats/gs_data.json")
            .done(function (data) {
                var totalCitation = data && data['citedby']
                var totalCitEl = document.getElementById('total_cit');
                if (totalCitEl && totalCitation !== undefined) {
                    totalCitEl.textContent = totalCitation;
                }

                Array.prototype.forEach.call(citationEles, function (element) {
                    var paperId = element.getAttribute('data-paper-id') || element.getAttribute('data')
                    var publication = data && data['publications'] && data['publications'][paperId]
                    if (!publication || publication['num_citations'] === undefined) {
                        element.style.display = 'none';
                        return;
                    }

                    element.textContent = 'Citations: ' + publication['num_citations'];
                });
            })
            .fail(hideCitationElements);
    })
</script>
